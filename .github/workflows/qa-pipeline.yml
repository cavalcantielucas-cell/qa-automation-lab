name: QA Automation Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  qa-tests:
    name: Run E2E and API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E tests with report
        run: npm run test:e2e:report

      - name: Run Postman API tests with Newman
        run: npm run test:api:report

      - name: Upload Cypress report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-report
          path: reports/cypress

      - name: Upload Newman API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-api-report
          path: reports/newman